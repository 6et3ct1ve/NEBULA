name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create devcontainer mounts
        run: |
          mkdir -p ~/.devcontainers/${{ github.event.repository.name }}
          touch ~/.devcontainers/${{ github.event.repository.name }}/.bash_history

      # Той самий Dockerfile що й локально — середовище ідентичне
      - name: Run checks inside dev container
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: |
            ruff format --check .
            ruff check .
            mypy .
            pytest